<!DOCTYPE html>  <!--declares the document type as HTML5  -->
<html lang="en"><!-- Root HTML element and language set to English -->
<head> <!-- Head section cntains metadata and links -->
    <meta charset="UTF-8"> <!-- defines character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- makes a website respinsive on mobile devices -->
    <title>furniture store</title> <!-- title that appears in browser ta -->
    <!-- linking the extrernal stylesheet -->
    <link rel="stylesheet" href="">
</head>
<body><!-- all visible content of the website starts here  -->

    <!-- Top Sale Bar Section -->
     <div class="top-sale-bar"><!-- container for sale announcement bar  -->
         <p>Big Sale! upto 50% off on selected furniture items</p> <!-- Sale message text -->
     </div>

     <!-- search bar section -->
    <div class="search-bar-section">
        <!-- wrapper fo search bar row -->
         <!-- left side text -->
          <div class="search-left-text"><!-- container for left side message -->
            <p>Welcome to  our furniture store</p> <!-- Greeting text -->
          </div>
          <!-- Search bar container -->
           <div class="search-container"><!-- container holding dropdown+ input + icon -->
            <!-- Category dropdown -->
             <select class="category-dropdown">
                <!-- dropdown for selecting category -->
                 <option value="">All categories</option><!-- Default catgory -->
                 <option value="">Tables</option><!-- Example category -->
                 <option value="">Sofas</option> <!-- Example category
                  -->
                 <option value="">Chairs</option><!-- Example category
                  -->
             </select>
             <!-- Search input -->
              <input type="text" placeholder="Search for products..." class="search-input">
              <!-- Search icon -->
               <img src="" alt="search icon" class="search-icon"><!-- Search button icon -->
           </div>
    </div>

    <!-- Navigation bar -->
     <nav class="navbar">
        <!-- Navigation bar container -->

        <!-- logo section -->
         <div class="logo"><!-- Logo container -->
            <h2>Furnishop</h2> <!-- Webiste logo text -->
         </div>

         <!-- Navigation links -->
          <ul class="nav-links"><!-- List container for navigation items -->
          <li><a href="#">Home</a></li> <!-- Home link -->
          <li><a href="#">Shop</a></li><!-- Shop Page -->
          <li><a href="#">About us</a></li><!-- About Page -->
          <li><a href="#"> Contact US</a></li><!-- Contact Page -->
          </ul>
          <!-- Right side icons -->
           <div class="nav-icons"><!-- Container for user icons -->
            <img src="" alt="user icon"><!-- user icon -->
            <img src="" alt="wishlist icon"> <!-- wishlist icon -->
            <img src="" alt="cart icon"><!-- Shoppng cart icon -->
           </div>
     </nav>
     <!-- Linking external javascript file -->
      <script src=""></script>
</body><!-- end of body -->
</html><!-- end of html document -->
